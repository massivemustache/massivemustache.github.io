<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Massive Mustache - Indie developer passionate about digital and board games."
    />
    <link rel="icon" type="image/png" sizes="16x16" href="assets/favicon/favicon_16.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon/favicon_32.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="assets/favicon/favicon_180.png" />
    <title>Massive Mustache</title>
    <style>
      :root {
        --bg: #07090f;
        --surface: #0d111b;
        --text: #f2f4f8;
        --muted: #c4cad6;
        --accent: #f40612;
        --accent-soft: #ff4a52;
        --warm: #ffb347;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Trebuchet MS", "Segoe UI", sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at 20% 20%, #1a2235 0%, transparent 45%),
          radial-gradient(circle at 80% 15%, #2a0f1a 0%, transparent 35%),
          linear-gradient(165deg, var(--bg) 0%, #06070c 55%, #090d18 100%);
        display: grid;
        place-items: center;
        padding: 2rem 1rem;
      }

      main {
        width: min(680px, 100%);
        background: linear-gradient(180deg, rgba(13, 17, 27, 0.92), rgba(8, 11, 18, 0.95));
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 24px;
        padding: clamp(1.5rem, 4vw, 2.5rem);
        text-align: center;
        box-shadow:
          0 20px 60px rgba(0, 0, 0, 0.55),
          0 0 0 1px rgba(244, 6, 18, 0.15) inset;
      }

      .logo {
        width: min(320px, 72vw);
        height: auto;
        display: block;
        margin: 0 auto 1.2rem;
      }

      p {
        margin: 1rem auto 0;
        color: var(--muted);
        max-width: 52ch;
        line-height: 1.6;
      }

      .contact {
        display: inline-block;
        margin-top: 1.7rem;
        padding: 0.72rem 1.15rem;
        border-radius: 999px;
        text-decoration: none;
        color: #fff;
        background: linear-gradient(135deg, var(--accent) 0%, var(--accent-soft) 100%);
        font-weight: 700;
        letter-spacing: 0.02em;
        transition: transform 0.15s ease, box-shadow 0.2s ease;
        box-shadow: 0 10px 24px rgba(244, 6, 18, 0.35);
      }

      .contact:hover {
        transform: translateY(-2px);
        box-shadow: 0 14px 30px rgba(244, 6, 18, 0.45);
      }
    </style>
  </head>
  <body>
    <main>
      <img class="logo" src="assets/big_logo_transparent.png" alt="Massive Mustache logo" />
      <p>Indie developer passionate about digital and board games.</p>
      <a class="contact" id="contact-link" href="#" aria-label="Send email to Massive Mustache">Contact Us</a>
    </main>
    <script>
      (function () {
        var user = ["con", "tact"].join("");
        var domain = ["massivem", "ustache", ".", "games"].join("");
        var email = user + "@" + domain;
        var contactLink = document.getElementById("contact-link");
        if (!contactLink) return;
        contactLink.href = "mailto:" + email;
        contactLink.textContent = email;
      })();
    </script>
  </body>
</html>
